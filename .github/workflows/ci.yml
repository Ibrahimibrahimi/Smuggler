name: CI

on:
  push:
    branches: [main, eldorado]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint check
        run: |
          python -m py_compile smuggler/cli.py
          python -m py_compile smuggler/scanner/core.py
          python -m py_compile smuggler/scanner/detectors.py
          python -m py_compile smuggler/scanner/http_utils.py
          python -m py_compile smuggler/payloads/database.py
          python -m py_compile smuggler/config/manager.py
          python -m py_compile smuggler/reports/generators.py
          python -m py_compile smuggler/gui/auth_app.py

      - name: Import check
        run: |
          python -c "from smuggler.cli import cli; print('CLI OK')"
          python -c "from smuggler.scanner.core import SmuggleScanner; print('Scanner OK')"
          python -c "from smuggler.scanner.detectors import detect_cl_te; print('Detectors OK')"
          python -c "from smuggler.scanner.http_utils import send_raw_http; print('HTTP Utils OK')"
          python -c "from smuggler.payloads.database import ALL_PAYLOADS; print(f'Payloads OK: {len(ALL_PAYLOADS)} payloads')"
          python -c "from smuggler.config.manager import ScanConfig; print('Config OK')"
          python -c "from smuggler.reports.generators import generate_reports; print('Reports OK')"

      - name: CLI help check
        run: |
          python -m smuggler --help
          python -m smuggler scan --help
          python -m smuggler list-techniques
          python -m smuggler version

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found yet"
